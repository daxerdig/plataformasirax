# =============================================================================
# SynkData Identity Intelligence Platform — Configuración de Alembic
# =============================================================================
# Alembic gestiona las migraciones del esquema de PostgreSQL.
#
# Comandos comunes:
#   alembic revision --autogenerate -m "descripción de la migración"
#   alembic upgrade head
#   alembic downgrade -1
# =============================================================================

[alembic]
# Ruta al directorio de migraciones
script_location = alembic

# Plantilla para archivos de migración
# file_template = %%(rev)s_%%(slug)s

# Zona horaria para los timestamps de las migraciones
# timezone =

# Longitud máxima del mensaje de revisión (truncate_slug_at)
# truncate_slug_length = 40

# Formato de la cadena de revisión
# revision_environment = false

# Fichero de salida para versiones actuales (sourceless = solo .pyc)
# output_encoding = utf-8

# URL de la base de datos — se utiliza la URL síncrona para Alembic
# ya que las migraciones se ejecutan de forma síncrona.
# NOTA: Se recomienda usar la variable de entorno SYNKDATA_DATABASE_URL
# para evitar hardcodear credenciales.
sqlalchemy.url = postgresql+psycopg2://synkdata:synkdata@localhost:5432/synkdata

[post_write_hooks]
# Formatear archivos de migración generados automáticamente con ruff
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
